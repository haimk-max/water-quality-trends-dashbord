<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ניטור מגמות איכות מים — דמו</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rubik',sans-serif;background:#f0f4f8;color:#1e293b;direction:rtl;min-height:100vh}

/* ─── HEADER ─── */
.hdr{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 60%,#1e40af 100%);
  padding:0 28px;height:62px;display:flex;align-items:center;gap:18px;
  box-shadow:0 4px 20px rgba(0,0,0,0.25);position:sticky;top:0;z-index:100}
.hdr-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.hdr-logo svg{width:32px;height:32px;flex-shrink:0}
.hdr-title{font-size:17px;font-weight:700;color:#fff;white-space:nowrap;letter-spacing:0.2px}
.hdr-title span{color:#60a5fa}
.hdr-sep{width:1px;height:32px;background:rgba(255,255,255,0.15);margin:0 4px}
.hdr select{font-family:inherit;background:rgba(255,255,255,0.1);color:#e2e8f0;
  border:1px solid rgba(255,255,255,0.2);padding:6px 14px;border-radius:8px;
  font-size:12px;cursor:pointer;font-weight:500;backdrop-filter:blur(4px)}
.hdr select option{background:#1e3a5f;color:#e2e8f0}
.hdr select:focus{outline:none;border-color:#60a5fa}
.hdr-spacer{flex:1}
.badge-demo{background:rgba(250,204,21,0.2);color:#fde047;border:1px solid rgba(250,204,21,0.3);
  padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:0.5px}

/* ─── SUMMARY CARDS ─── */
.cards-row{display:flex;gap:12px;padding:20px 28px 12px;flex-wrap:wrap}
.card{border-radius:14px;padding:16px 22px;min-width:120px;display:flex;flex-direction:column;
  gap:4px;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;transition:transform .15s,box-shadow .15s;
  border:2px solid transparent;position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,0.12)}
.card.active{border-color:currentColor}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:currentColor;opacity:0.5}
.card-alert{background:#fff5f5;color:#dc2626}
.card-watch{background:#fffdf0;color:#d97706}
.card-ok   {background:#f0fdf4;color:#16a34a}
.card-total{background:#f0f7ff;color:#2563eb}
.card .lbl{font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;opacity:0.7}
.card .num{font-size:36px;font-weight:800;line-height:1}
.card .sub{font-size:11px;opacity:0.6;font-weight:500}

/* ─── MAIN SPLIT ─── */
.main{display:grid;grid-template-columns:1fr 420px;gap:0;
  height:calc(100vh - 62px - 108px);min-height:500px}

/* ─── TABLE PANEL ─── */
.tpanel{background:#fff;border-left:1px solid #e2e8f0;display:flex;flex-direction:column;overflow:hidden}
.tpanel-hdr{padding:10px 18px;background:#f8fafc;border-bottom:1px solid #e2e8f0;
  display:flex;align-items:center;gap:8px;font-size:12px;color:#64748b;font-weight:500}
.tpanel-hdr span{color:#1e293b;font-weight:600}
.tscroll{overflow-y:auto;flex:1}
.tscroll::-webkit-scrollbar{width:4px}
.tscroll::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:2px}
table{width:100%;border-collapse:collapse}
thead th{position:sticky;top:0;background:#f1f5f9;padding:8px 10px;text-align:right;
  font-weight:600;color:#475569;border-bottom:2px solid #e2e8f0;
  font-size:11px;white-space:nowrap;user-select:none;cursor:pointer}
thead th:hover{background:#e2e8f0;color:#1e293b}
tbody tr{border-bottom:1px solid #f1f5f9;cursor:pointer;transition:background .12s}
tbody tr:hover{background:#f8faff}
tbody tr.sel{background:#eff6ff}
tbody tr.alert-row td:first-child{box-shadow:inset 3px 0 0 #dc2626}
tbody tr.watch-row td:first-child{box-shadow:inset 3px 0 0 #d97706}
tbody tr.ok-row td:first-child{box-shadow:inset 3px 0 0 #16a34a}
td{padding:7px 10px;white-space:nowrap;font-size:12px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;
  border-radius:6px;font-size:11px;font-weight:600}
.b-a{background:#fef2f2;color:#dc2626}
.b-w{background:#fffbeb;color:#d97706}
.b-o{background:#f0fdf4;color:#16a34a}
.pct-red{color:#dc2626;font-weight:700}
.pct-ora{color:#d97706;font-weight:600}
.pct-gray{color:#94a3b8}
.sl-up{color:#d97706;font-weight:600}
.sl-dn{color:#2563eb;font-weight:600}
.snr-g{color:#16a34a;font-weight:600}
.snr-o{color:#d97706;font-weight:600}
.snr-gr{color:#94a3b8}

/* ─── CHART PANEL ─── */
.cpanel{background:#fafbfd;display:flex;flex-direction:column;overflow:hidden}
.cpanel-hdr{padding:10px 18px;background:#f8fafc;border-bottom:1px solid #e2e8f0;
  font-size:12px;color:#64748b;font-weight:500}
.cpanel-hdr b{color:#1e293b}
.cbody{flex:1;overflow-y:auto;padding:14px}
.chart-wrap{background:#fff;border-radius:12px;padding:14px 16px 10px;
  margin-bottom:12px;box-shadow:0 1px 6px rgba(0,0,0,0.06);border:1px solid #e8eef4}
.chart-title{font-size:12px;font-weight:600;color:#334155;margin-bottom:8px;display:flex;justify-content:space-between}
.chart-title .stat-info{font-size:11px;color:#94a3b8;font-weight:400}
canvas.chart{width:100%;height:160px;display:block}
.empty-chart{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:#94a3b8;gap:12px;font-size:14px}
.empty-chart svg{width:48px;height:48px;opacity:0.3}
</style>
</head>
<body>

<!-- HEADER -->
<header class="hdr">
  <a class="hdr-logo">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="14" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
      <path d="M8 20 Q12 10 16 16 Q20 22 24 12" stroke="#60a5fa" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="16" r="3" fill="#60a5fa" opacity="0.7"/>
      <line x1="8" y1="23" x2="24" y2="23" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    </svg>
    <span class="hdr-title">ניטור מגמות <span>איכות מים</span></span>
  </a>
  <div class="hdr-sep"></div>
  <select id="selParam">
    <option value="">כל הפרמטרים</option>
    <option value="TCEY">TCE</option>
    <option value="TECE">PCE</option>
    <option value="MTBE">MTBE</option>
  </select>
  <select id="selBasin">
    <option value="">כל האגנות</option>
    <option value="חוף">חוף</option>
    <option value="ירקון">ירקון</option>
    <option value="שורק">שורק</option>
  </select>
  <div class="hdr-spacer"></div>
  <span class="badge-demo">DEMO</span>
</header>

<!-- CARDS -->
<div class="cards-row">
  <div class="card card-alert" onclick="filterAlert('ALERT')">
    <div class="lbl">🔴 התרעה</div>
    <div class="num" id="cnt-alert">3</div>
    <div class="sub">קידוחים</div>
  </div>
  <div class="card card-watch" onclick="filterAlert('WATCH')">
    <div class="lbl">🟡 מעקב</div>
    <div class="num" id="cnt-watch">3</div>
    <div class="sub">קידוחים</div>
  </div>
  <div class="card card-ok" onclick="filterAlert('OK')">
    <div class="lbl">🟢 תקין</div>
    <div class="num" id="cnt-ok">2</div>
    <div class="sub">קידוחים</div>
  </div>
  <div class="card card-total" onclick="filterAlert('')">
    <div class="lbl">סה"כ</div>
    <div class="num">8</div>
    <div class="sub">קידוחים פעילים</div>
  </div>
</div>

<!-- MAIN SPLIT -->
<div class="main">
  <!-- TABLE -->
  <div class="tpanel">
    <div class="tpanel-hdr">
      <span id="tbl-count">8</span> קידוחים &nbsp;|&nbsp; לחץ שורה לצפייה בגרף
    </div>
    <div class="tscroll">
      <table id="tbl">
        <thead>
          <tr>
            <th>סטטוס</th>
            <th>קידוח</th>
            <th>פרמטר</th>
            <th title="ריכוז אחרון / תקן">% מתקן</th>
            <th title="ריכוז אחרון">אחרון</th>
            <th title="שיפוע %תקן/שנה">שיפוע</th>
            <th title="יחס אות/רעש">SNR</th>
            <th title="שנים להגיע לתקן">שנים→תקן</th>
            <th title="3 מדידות אחרונות עולות">⚡</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- CHART PANEL -->
  <div class="cpanel">
    <div class="cpanel-hdr" id="cpanel-title">בחר קידוח לצפייה בגרף</div>
    <div class="cbody" id="cbody">
      <div class="empty-chart">
        <svg viewBox="0 0 48 48" fill="none">
          <path d="M6 36 L14 20 L22 28 L30 14 L38 22 L44 10" stroke="#94a3b8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
          <circle cx="6" cy="36" r="3" fill="#94a3b8"/>
          <circle cx="44" cy="10" r="3" fill="#94a3b8"/>
        </svg>
        לחץ על שורה בטבלה לצפייה בגרף מגמה
      </div>
    </div>
  </div>
</div>

<script>
// ─── DEMO DATA (8 wells) ───
const DEMO = [
  { w:"תא עיר מסילה",   p:"TCEY", b:"ירקון", std:10, lc:505.3, pct:50.53, a:"ALERT", tr:true,  trend:"UP",   spc:42.1, snr:2.67, yt:null,
    ts:{dates:["2019-03","2020-01","2021-06","2022-03","2023-01","2024-06","2025-03"],
        raw:[12,28,95,185,310,440,505],adj:[12,28,95,185,310,440,505],markers:["","","","","","",""]} },
  { w:"נורדוי 5",        p:"TECE", b:"חוף",   std:10, lc:77.4,  pct:7.74,  a:"ALERT", tr:true,  trend:"UP",   spc:18.3, snr:0.59, yt:null,
    ts:{dates:["2019-06","2020-03","2021-01","2022-09","2023-06","2024-03","2025-01"],
        raw:[8,18,32,45,60,68,77],adj:[8,18,32,45,60,68,77],markers:["","","","","","",""]} },
  { w:"נתניה 42",        p:"TCEY", b:"חוף",   std:10, lc:7.8,   pct:0.78,  a:"ALERT", tr:true,  trend:"UP",   spc:14.5, snr:1.2,  yt:1.4,
    ts:{dates:["2020-01","2021-01","2022-06","2023-01","2024-01","2025-01"],
        raw:[2.1,3.4,4.8,5.9,6.8,7.8],adj:[2.1,3.4,4.8,5.9,6.8,7.8],markers:["","","","","",""]} },
  { w:"בת ים 14",        p:"TCEY", b:"שורק",  std:10, lc:49.3,  pct:4.93,  a:"WATCH", tr:false, trend:"NONE", spc:0.8,  snr:0.20, yt:null,
    ts:{dates:["2019-01","2020-06","2021-01","2022-06","2023-01","2024-06","2025-01"],
        raw:[55,30,62,38,55,42,49],adj:[55,30,62,38,55,42,49],markers:["","","","","","",""]} },
  { w:"חרות גפן",        p:"TECE", b:"חוף",   std:10, lc:3.7,   pct:0.37,  a:"WATCH", tr:true,  trend:"UP",   spc:6.2,  snr:0.45, yt:null,
    ts:{dates:["2019-01","2020-01","2021-01","2022-06","2023-01","2024-06","2025-01"],
        raw:[0.4,0.3,1.8,2.4,3.0,3.4,3.7],adj:[0.4,0.3,1.8,2.4,3.0,3.4,3.7],markers:["<","<","","","","",""]} },
  { w:"אשדוד 31",        p:"TCEY", b:"שורק",  std:10, lc:2.7,   pct:0.27,  a:"WATCH", tr:true,  trend:"UP",   spc:3.8,  snr:0.62, yt:null,
    ts:{dates:["2019-06","2020-06","2021-06","2022-06","2023-06","2024-06","2025-01"],
        raw:[0.4,0.8,1.2,1.7,2.1,2.4,2.7],adj:[0.4,0.8,1.2,1.7,2.1,2.4,2.7],markers:["","","","","","",""]} },
  { w:"חולון 6",         p:"TCEY", b:"שורק",  std:10, lc:0.5,   pct:0.05,  a:"OK",    tr:false, trend:"DOWN", spc:-8.1, snr:1.72, yt:null,
    ts:{dates:["2019-06","2020-06","2021-06","2022-06","2023-06","2024-06","2025-01"],
        raw:[6.8,5.2,3.9,2.7,1.8,0.9,0.5],adj:[6.8,5.2,3.9,2.7,1.8,0.9,0.5],markers:["","","","","","",""]} },
  { w:"באר טוביה 1",     p:"MTBE", b:"שורק",  std:5,  lc:0.3,   pct:0.06,  a:"OK",    tr:false, trend:"NONE", spc:0.2,  snr:0.15, yt:null,
    ts:{dates:["2020-01","2021-06","2022-06","2023-06","2024-06","2025-01"],
        raw:[0,0.1,0,0.2,0.3,0.3],adj:[0.001,0.1,0.001,0.2,0.3,0.3],markers:["<","","<","","",""]} },
];

let activeAlert = '', selIdx = -1;

function pctFmt(p){ return (p*100).toFixed(0)+'%' }
function pctCls(p){ return p>=0.8?'pct-red':p>=0.3?'pct-ora':'pct-gray' }
function slCls(s){ return s>0?'sl-up':'sl-dn' }
function snrCls(s){ return s>=1?'snr-g':s>=0.3?'snr-o':'snr-gr' }
function alertCls(a){ return a==='ALERT'?'alert-row':a==='WATCH'?'watch-row':'ok-row' }
function badge(a){ return a==='ALERT'?'<span class="badge b-a">🔴 התרעה</span>':
                          a==='WATCH'?'<span class="badge b-w">🟡 מעקב</span>':
                                      '<span class="badge b-o">🟢 תקין</span>' }

function render(){
  const rows = DEMO.filter(d=>(activeAlert?d.a===activeAlert:true));
  document.getElementById('tbl-count').textContent = rows.length;
  const tb = document.getElementById('tbody');
  tb.innerHTML = rows.map((d,i)=>`
    <tr class="${alertCls(d.a)}${selIdx===DEMO.indexOf(d)?' sel':''}" onclick="selectRow(${DEMO.indexOf(d)})">
      <td>${badge(d.a)}</td>
      <td><b>${d.w}</b></td>
      <td>${d.p}</td>
      <td class="${pctCls(d.pct)}">${pctFmt(d.pct)}</td>
      <td>${d.lc} µg/L</td>
      <td class="${slCls(d.spc)}">${d.spc>0?'+':''}${d.spc.toFixed(1)}</td>
      <td class="${snrCls(d.snr)}">${d.snr.toFixed(2)}</td>
      <td>${d.yt?'<span style="color:#dc2626;font-weight:700">'+d.yt.toFixed(1)+'</span>':'—'}</td>
      <td>${d.tr?'⚡':''}</td>
    </tr>`).join('');
}

function filterAlert(v){ activeAlert=v; selIdx=-1; render(); drawChart(); }

function selectRow(i){
  selIdx = i;
  document.querySelectorAll('#tbody tr').forEach(r=>r.classList.remove('sel'));
  event.currentTarget.classList.add('sel');
  drawChart();
}

function drawChart(){
  const cbody = document.getElementById('cbody');
  if(selIdx<0){ cbody.innerHTML='<div class="empty-chart"><svg viewBox="0 0 48 48" fill="none"><path d="M6 36 L14 20 L22 28 L30 14 L38 22 L44 10" stroke="#94a3b8" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>לחץ על שורה בטבלה לצפייה בגרף מגמה</div>'; return; }
  const d = DEMO[selIdx];
  document.getElementById('cpanel-title').innerHTML = `<b>${d.w}</b> — ${d.p} | תקן: ${d.std} µg/L`;
  cbody.innerHTML = `<div class="chart-wrap">
    <div class="chart-title">
      <span>סדרת זמן — ריכוז µg/L</span>
      <span class="stat-info">SNR: ${d.snr} | שיפוע: ${d.spc>0?'+':''}${d.spc}%תקן/שנה</span>
    </div>
    <canvas id="cv" class="chart" width="380" height="160"></canvas>
  </div>`;
  const cv = document.getElementById('cv');
  cv.width = cv.parentElement.clientWidth - 32;
  paintChart(cv, d);
}

function paintChart(cv, d){
  const ctx = cv.getContext('2d');
  const W=cv.width, H=cv.height;
  const PAD={t:10,r:14,b:30,l:44};
  const vals = d.ts.adj, raw = d.ts.raw, dates = d.ts.dates, marks = d.ts.markers;
  const n = vals.length;
  const maxV = Math.max(...vals, d.std*1.05);
  const minV = 0;
  const pw = W-PAD.l-PAD.r, ph = H-PAD.t-PAD.b;
  const xOf = i=>(PAD.l + i/(n-1)*pw);
  const yOf = v=>(PAD.t + (1-(v-minV)/(maxV-minV))*ph);

  ctx.clearRect(0,0,W,H);

  // Grid
  ctx.strokeStyle='#f1f5f9'; ctx.lineWidth=1;
  for(let g=0;g<=4;g++){
    const y=PAD.t+g/4*ph;
    ctx.beginPath();ctx.moveTo(PAD.l,y);ctx.lineTo(W-PAD.r,y);ctx.stroke();
    const v=(maxV*(1-g/4)).toFixed(1);
    ctx.fillStyle='#94a3b8';ctx.font='10px Rubik';ctx.textAlign='right';
    ctx.fillText(v,PAD.l-4,y+3);
  }

  // Standard line
  const ystd=yOf(d.std);
  ctx.setLineDash([6,3]); ctx.strokeStyle='#ef4444'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(PAD.l,ystd);ctx.lineTo(W-PAD.r,ystd);ctx.stroke();
  ctx.fillStyle='#ef4444';ctx.font='bold 10px Rubik';ctx.textAlign='left';
  ctx.fillText('תקן',W-PAD.r+2,ystd+3);

  // 30% line
  const y30=yOf(d.std*0.3);
  ctx.setLineDash([4,4]); ctx.strokeStyle='#f97316'; ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(PAD.l,y30);ctx.lineTo(W-PAD.r,y30);ctx.stroke();

  ctx.setLineDash([]);

  // Area fill
  ctx.beginPath();
  ctx.moveTo(xOf(0),yOf(vals[0]));
  for(let i=1;i<n;i++) ctx.lineTo(xOf(i),yOf(vals[i]));
  ctx.lineTo(xOf(n-1),H-PAD.b); ctx.lineTo(xOf(0),H-PAD.b); ctx.closePath();
  ctx.fillStyle='rgba(37,99,235,0.07)';ctx.fill();

  // Line
  ctx.beginPath();ctx.moveTo(xOf(0),yOf(vals[0]));
  for(let i=1;i<n;i++) ctx.lineTo(xOf(i),yOf(vals[i]));
  ctx.strokeStyle='#2563eb';ctx.lineWidth=2;ctx.stroke();

  // Points
  for(let i=0;i<n;i++){
    const x=xOf(i), y=yOf(vals[i]);
    const det = marks[i]!=='<' && raw[i]>0;
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);
    if(det){ ctx.fillStyle='#2563eb';ctx.fill(); }
    else { ctx.fillStyle='#fff';ctx.fill();ctx.strokeStyle='#2563eb';ctx.lineWidth=1.5;ctx.stroke(); }
  }

  // X axis labels
  ctx.fillStyle='#94a3b8';ctx.font='10px Rubik';ctx.textAlign='center';
  const step=Math.ceil(n/5);
  for(let i=0;i<n;i+=step){
    ctx.fillText(dates[i].slice(0,7),xOf(i),H-PAD.b+14);
  }
}

render();
</script>
</body>
</html>
