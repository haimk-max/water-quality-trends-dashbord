<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ניטור מגמות איכות מים — דמו</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1120;--surface:#111827;--surface2:#1a2236;--border:#1e2d45;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --red:#ef4444;--red-bg:rgba(239,68,68,0.12);--red-border:rgba(239,68,68,0.25);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);--amber-border:rgba(245,158,11,0.25);
  --green:#22c55e;--green-bg:rgba(34,197,94,0.12);--green-border:rgba(34,197,94,0.25);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,0.12);--blue-border:rgba(59,130,246,0.25);
  --purple:#a78bfa;--cyan:#22d3ee;
  --radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Rubik',sans-serif;background:var(--bg);color:var(--text);direction:rtl;min-height:100vh;overflow:hidden}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:#2d3f5e}

/* ─── HEADER ─── */
.hdr{
  background:linear-gradient(90deg,rgba(59,130,246,0.08) 0%,transparent 50%,rgba(139,92,246,0.06) 100%);
  border-bottom:1px solid var(--border);
  padding:0 24px;height:56px;display:flex;align-items:center;gap:16px;
  backdrop-filter:blur(12px);position:sticky;top:0;z-index:100}
.hdr-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.hdr-icon{width:32px;height:32px;border-radius:8px;
  background:linear-gradient(135deg,#3b82f6,#8b5cf6);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(59,130,246,0.3)}
.hdr-icon svg{width:18px;height:18px}
.hdr-title{font-size:15px;font-weight:600;color:var(--text);white-space:nowrap;letter-spacing:0.3px}
.hdr-title span{background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-sep{width:1px;height:24px;background:var(--border)}
.hdr select{font-family:inherit;background:var(--surface2);color:var(--text2);
  border:1px solid var(--border);padding:6px 12px;border-radius:8px;
  font-size:11px;cursor:pointer;font-weight:500;transition:border .2s}
.hdr select:focus{outline:none;border-color:var(--blue)}
.hdr select option{background:var(--surface);color:var(--text)}
.hdr-spacer{flex:1}
.badge-demo{background:rgba(250,204,21,0.1);color:#fde047;border:1px solid rgba(250,204,21,0.2);
  padding:3px 12px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:1px}

/* ─── SUMMARY CARDS ─── */
.cards-row{display:flex;gap:10px;padding:16px 24px 10px;flex-wrap:wrap}
.card{border-radius:var(--radius);padding:14px 20px;min-width:130px;flex:1;
  display:flex;flex-direction:column;gap:2px;cursor:pointer;
  transition:all .2s;border:1px solid transparent;position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px);border-color:currentColor}
.card.active{border-color:currentColor;box-shadow:0 0 24px currentColor}
.card::after{content:'';position:absolute;inset:0;opacity:0.04;background:currentColor}
.card-alert{background:var(--red-bg);color:var(--red);border-color:var(--red-border)}
.card-watch{background:var(--amber-bg);color:var(--amber);border-color:var(--amber-border)}
.card-ok   {background:var(--green-bg);color:var(--green);border-color:var(--green-border)}
.card-total{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-border)}
.card .lbl{font-size:10px;font-weight:600;letter-spacing:0.5px;opacity:0.8}
.card .num{font-size:32px;font-weight:800;line-height:1.1}
.card .sub{font-size:10px;opacity:0.5;font-weight:400}

/* ─── LAYOUT ─── */
.main{display:grid;grid-template-columns:1fr 440px;gap:0;
  height:calc(100vh - 56px - 90px);min-height:460px}

/* ─── TABLE PANEL ─── */
.tpanel{background:var(--surface);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;border-radius:var(--radius) 0 0 var(--radius);margin:0 0 0 0}
.tpanel-hdr{padding:10px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:8px;font-size:11px;color:var(--text3);font-weight:500}
.tpanel-hdr b{color:var(--text);font-weight:600;font-size:12px}
.tscroll{overflow-y:auto;flex:1}
table{width:100%;border-collapse:collapse}
thead th{position:sticky;top:0;background:var(--surface2);padding:8px 10px;text-align:right;
  font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);
  font-size:10px;white-space:nowrap;user-select:none;cursor:pointer;
  text-transform:uppercase;letter-spacing:0.5px}
thead th:hover{color:var(--text)}
tbody tr{border-bottom:1px solid rgba(30,45,69,0.5);cursor:pointer;transition:background .12s}
tbody tr:hover{background:rgba(59,130,246,0.04)}
tbody tr.sel{background:rgba(59,130,246,0.08);box-shadow:inset 3px 0 0 var(--blue)}
td{padding:8px 10px;white-space:nowrap;font-size:11px;color:var(--text2)}
td:nth-child(2){color:var(--text);font-weight:500}

.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;
  border-radius:6px;font-size:10px;font-weight:600;letter-spacing:0.3px}
.b-a{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.b-w{background:var(--amber-bg);color:var(--amber);border:1px solid var(--amber-border)}
.b-o{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}

.val-up{color:var(--amber);font-weight:600;font-variant-numeric:tabular-nums}
.val-dn{color:var(--blue);font-weight:600;font-variant-numeric:tabular-nums}
.val-dim{color:var(--text3);font-variant-numeric:tabular-nums}
.pct-hi{color:var(--red);font-weight:700}
.pct-mid{color:var(--amber);font-weight:600}
.pct-lo{color:var(--text3)}
.snr-hi{color:var(--green)}
.snr-mid{color:var(--amber)}
.snr-lo{color:var(--text3)}

/* ─── CHART PANEL ─── */
.cpanel{background:var(--bg);display:flex;flex-direction:column;overflow:hidden}
.cpanel-hdr{padding:10px 18px;border-bottom:1px solid var(--border);
  font-size:12px;color:var(--text3);font-weight:500;background:var(--surface)}
.cpanel-hdr b{color:var(--text)}
.cbody{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px}
.chart-card{background:var(--surface);border-radius:var(--radius);padding:16px 18px 12px;
  border:1px solid var(--border)}
.chart-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.chart-head .ch-title{font-size:12px;font-weight:600;color:var(--text)}
.chart-head .ch-sub{font-size:10px;color:var(--text3)}
canvas.cv{width:100%;display:block}

.stat-pills{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
.sp{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:500;
  background:var(--surface2);border:1px solid var(--border);color:var(--text2)}
.sp b{color:var(--text);font-weight:600}

.legend-row{display:flex;gap:14px;justify-content:center;margin-top:6px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text3)}
.legend-dot{width:10px;height:3px;border-radius:2px}

.empty-chart{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;color:var(--text3);gap:14px;font-size:13px;font-weight:400}
.empty-chart svg{width:56px;height:56px;opacity:0.2}
</style>
</head>
<body>

<header class="hdr">
  <a class="hdr-logo">
    <div class="hdr-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round">
        <path d="M3 17 L9 11 L13 15 L21 7"/><circle cx="21" cy="7" r="2" fill="#fff"/>
      </svg>
    </div>
    <span class="hdr-title">ניטור מגמות <span>איכות מים</span></span>
  </a>
  <div class="hdr-sep"></div>
  <select id="selParam"><option value="">כל הפרמטרים</option><option value="TCEY">TCE</option><option value="TECE">PCE</option><option value="MTBE">MTBE</option></select>
  <select id="selBasin"><option value="">כל האגנות</option><option value="חוף">חוף</option><option value="ירקון">ירקון</option><option value="שורק">שורק</option></select>
  <div class="hdr-spacer"></div>
  <span class="badge-demo">DEMO</span>
</header>

<div class="cards-row">
  <div class="card card-alert" onclick="filterAlert('ALERT')"><div class="lbl">התרעה</div><div class="num" id="cnt-a">3</div><div class="sub">קידוחים</div></div>
  <div class="card card-watch" onclick="filterAlert('WATCH')"><div class="lbl">מעקב</div><div class="num" id="cnt-w">3</div><div class="sub">קידוחים</div></div>
  <div class="card card-ok" onclick="filterAlert('OK')"><div class="lbl">תקין</div><div class="num" id="cnt-o">2</div><div class="sub">קידוחים</div></div>
  <div class="card card-total" onclick="filterAlert('')"><div class="lbl">סה"כ</div><div class="num">8</div><div class="sub">קידוחים פעילים</div></div>
</div>

<div class="main">
  <div class="tpanel">
    <div class="tpanel-hdr"><b id="tbl-count">8</b>&nbsp;קידוחים &nbsp;·&nbsp; לחץ שורה לצפייה בגרף</div>
    <div class="tscroll">
      <table><thead><tr>
        <th>סטטוס</th><th>קידוח</th><th>פרמטר</th><th>% מתקן</th><th>אחרון</th><th>שיפוע</th><th>SNR</th><th>שנים→תקן</th><th>⚡</th>
      </tr></thead><tbody id="tbody"></tbody></table>
    </div>
  </div>
  <div class="cpanel">
    <div class="cpanel-hdr" id="cpanel-title">בחר קידוח מהטבלה</div>
    <div class="cbody" id="cbody">
      <div class="empty-chart">
        <svg viewBox="0 0 56 56" fill="none"><path d="M8 42 L18 26 L26 34 L36 18 L44 24 L52 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        לחץ על שורה בטבלה לצפייה בגרף מגמה
      </div>
    </div>
  </div>
</div>

<script>
const DEMO = [
  { w:"תא עיר מסילה", p:"TCEY", b:"ירקון", std:10, lc:505.3, pct:50.53, a:"ALERT", tr:true, trend:"UP", spc:42.1, snr:2.67, yt:null,
    cp:"2020-01", cpd:"UP",
    ts:{dates:["2019-03","2020-01","2021-06","2022-03","2023-01","2024-06","2025-03"],
        raw:[12,28,95,185,310,440,505],adj:[12,28,95,185,310,440,505],markers:["","","","","","",""]} },
  { w:"נורדוי 5", p:"TECE", b:"חוף", std:10, lc:77.4, pct:7.74, a:"ALERT", tr:true, trend:"UP", spc:18.3, snr:0.59, yt:null,
    cp:"2021-01", cpd:"UP",
    ts:{dates:["2019-06","2020-03","2021-01","2022-09","2023-06","2024-03","2025-01"],
        raw:[8,18,32,45,60,68,77],adj:[8,18,32,45,60,68,77],markers:["","","","","","",""]} },
  { w:"נתניה 42", p:"TCEY", b:"חוף", std:10, lc:7.8, pct:0.78, a:"ALERT", tr:true, trend:"UP", spc:14.5, snr:1.2, yt:1.4,
    cp:"2022-06", cpd:"UP",
    ts:{dates:["2020-01","2021-01","2022-06","2023-01","2024-01","2025-01"],
        raw:[2.1,3.4,4.8,5.9,6.8,7.8],adj:[2.1,3.4,4.8,5.9,6.8,7.8],markers:["","","","","",""]} },
  { w:"בת ים 14", p:"TCEY", b:"שורק", std:10, lc:49.3, pct:4.93, a:"WATCH", tr:false, trend:"NONE", spc:0.8, snr:0.20, yt:null,
    cp:null, cpd:null,
    ts:{dates:["2019-01","2020-06","2021-01","2022-06","2023-01","2024-06","2025-01"],
        raw:[55,30,62,38,55,42,49],adj:[55,30,62,38,55,42,49],markers:["","","","","","",""]} },
  { w:"חרות גפן", p:"TECE", b:"חוף", std:10, lc:3.7, pct:0.37, a:"WATCH", tr:true, trend:"UP", spc:6.2, snr:0.45, yt:null,
    cp:"2021-01", cpd:"UP",
    ts:{dates:["2019-01","2020-01","2021-01","2022-06","2023-01","2024-06","2025-01"],
        raw:[0.4,0.3,1.8,2.4,3.0,3.4,3.7],adj:[0.4,0.3,1.8,2.4,3.0,3.4,3.7],markers:["<","<","","","","",""]} },
  { w:"אשדוד 31", p:"TCEY", b:"שורק", std:10, lc:2.7, pct:0.27, a:"WATCH", tr:true, trend:"UP", spc:3.8, snr:0.62, yt:null,
    cp:null, cpd:null,
    ts:{dates:["2019-06","2020-06","2021-06","2022-06","2023-06","2024-06","2025-01"],
        raw:[0.4,0.8,1.2,1.7,2.1,2.4,2.7],adj:[0.4,0.8,1.2,1.7,2.1,2.4,2.7],markers:["","","","","","",""]} },
  { w:"חולון 6", p:"TCEY", b:"שורק", std:10, lc:0.5, pct:0.05, a:"OK", tr:false, trend:"DOWN", spc:-8.1, snr:1.72, yt:null,
    cp:"2019-06", cpd:"DOWN",
    ts:{dates:["2019-06","2020-06","2021-06","2022-06","2023-06","2024-06","2025-01"],
        raw:[6.8,5.2,3.9,2.7,1.8,0.9,0.5],adj:[6.8,5.2,3.9,2.7,1.8,0.9,0.5],markers:["","","","","","",""]} },
  { w:"באר טוביה 1", p:"MTBE", b:"שורק", std:5, lc:0.3, pct:0.06, a:"OK", tr:false, trend:"NONE", spc:0.2, snr:0.15, yt:null,
    cp:null, cpd:null,
    ts:{dates:["2020-01","2021-06","2022-06","2023-06","2024-06","2025-01"],
        raw:[0,0.1,0,0.2,0.3,0.3],adj:[0.001,0.1,0.001,0.2,0.3,0.3],markers:["<","","<","","",""]} },
];

let activeAlert='', selIdx=-1, activeCard=null;

const badge=a=>a==='ALERT'?'<span class="badge b-a">התרעה</span>':a==='WATCH'?'<span class="badge b-w">מעקב</span>':'<span class="badge b-o">תקין</span>';
const pctCls=p=>p>=0.8?'pct-hi':p>=0.3?'pct-mid':'pct-lo';
const slCls=s=>s>0?'val-up':s<0?'val-dn':'val-dim';
const snrCls=s=>s>=1?'snr-hi':s>=0.3?'snr-mid':'snr-lo';

function render(){
  const param=document.getElementById('selParam').value;
  const basin=document.getElementById('selBasin').value;
  const rows=DEMO.filter(d=>
    (!activeAlert||d.a===activeAlert) &&
    (!param||d.p===param) &&
    (!basin||d.b===basin)
  );
  document.getElementById('tbl-count').textContent=rows.length;
  const tb=document.getElementById('tbody');
  tb.innerHTML=rows.map(d=>{
    const gi=DEMO.indexOf(d);
    return `<tr class="${selIdx===gi?'sel':''}" onclick="selectRow(${gi},this)">
      <td>${badge(d.a)}</td>
      <td>${d.w}</td>
      <td>${d.p}</td>
      <td class="${pctCls(d.pct)}">${(d.pct*100).toFixed(0)}%</td>
      <td class="val-dim">${d.lc}</td>
      <td class="${slCls(d.spc)}">${d.spc>0?'+':''}${d.spc.toFixed(1)}</td>
      <td class="${snrCls(d.snr)}">${d.snr.toFixed(2)}</td>
      <td>${d.yt?'<span class="pct-hi">'+d.yt.toFixed(1)+'</span>':'—'}</td>
      <td>${d.tr?'⚡':''}</td>
    </tr>`;
  }).join('');
}

function filterAlert(v){
  activeAlert=v;selIdx=-1;
  document.querySelectorAll('.card').forEach(c=>{c.classList.remove('active')});
  if(v){event.currentTarget.classList.add('active');activeCard=event.currentTarget}
  else{activeCard=null}
  render();drawChart();
}

document.getElementById('selParam').onchange=()=>{render()};
document.getElementById('selBasin').onchange=()=>{render()};

function selectRow(i,el){selIdx=i;render();drawChart();}

function drawChart(){
  const cb=document.getElementById('cbody');
  if(selIdx<0){cb.innerHTML='<div class="empty-chart"><svg viewBox="0 0 56 56" fill="none"><path d="M8 42 L18 26 L26 34 L36 18 L44 24 L52 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>לחץ על שורה בטבלה לצפייה בגרף מגמה</div>';return;}
  const d=DEMO[selIdx];
  document.getElementById('cpanel-title').innerHTML=`<b>${d.w}</b> &mdash; ${d.p} &nbsp;|&nbsp; תקן: ${d.std} µg/L`;

  const trendHeb=d.trend==='UP'?'עולה':d.trend==='DOWN'?'יורד':'ללא';
  const trendColor=d.trend==='UP'?'var(--amber)':d.trend==='DOWN'?'var(--blue)':'var(--text3)';

  cb.innerHTML=`
    <div class="chart-card">
      <div class="chart-head">
        <span class="ch-title">סדרת זמן — ריכוז (µg/L)</span>
        <span class="ch-sub">${d.ts.dates.length} דגימות</span>
      </div>
      <canvas id="cv" class="cv" height="200"></canvas>
      <div class="legend-row">
        <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>ריכוז</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--red)"></div>תקן</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--amber);height:2px;border-top:1px dashed var(--amber)"></div>30% מתקן</div>
        ${d.cp?'<div class="legend-item"><div class="legend-dot" style="background:var(--purple)"></div>שינוי מגמה</div>':''}
      </div>
    </div>
    <div class="stat-pills">
      <div class="sp">מגמה: <b style="color:${trendColor}">${trendHeb}</b></div>
      <div class="sp">שיפוע: <b>${d.spc>0?'+':''}${d.spc.toFixed(1)}</b> %תקן/שנה</div>
      <div class="sp">SNR: <b>${d.snr.toFixed(2)}</b></div>
      ${d.yt?'<div class="sp">שנים לתקן: <b style="color:var(--red)">'+d.yt.toFixed(1)+'</b></div>':''}
      ${d.cp?'<div class="sp">שינוי מגמה: <b style="color:var(--purple)">'+d.cp+' ('+({UP:'עלייה',DOWN:'ירידה'}[d.cpd]||'—')+')</b></div>':''}
      <div class="sp">טריגר: <b>${d.tr?'⚡ כן':'לא'}</b></div>
    </div>`;

  const cv=document.getElementById('cv');
  cv.width=cv.parentElement.clientWidth-36;
  paintChart(cv,d);
}

function paintChart(cv,d){
  const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height;
  const P={t:14,r:16,b:32,l:48};
  const vals=d.ts.adj,dates=d.ts.dates,marks=d.ts.markers,raw=d.ts.raw;
  const n=vals.length;
  const maxV=Math.max(...vals,d.std*1.15)*1.05;
  const pw=W-P.l-P.r,ph=H-P.t-P.b;
  const xOf=i=>P.l+i/(n-1)*pw;
  const yOf=v=>P.t+(1-v/maxV)*ph;
  ctx.clearRect(0,0,W,H);

  // ── Grid lines ──
  ctx.strokeStyle='rgba(30,45,69,0.6)';ctx.lineWidth=0.5;
  const gridN=5;
  for(let g=0;g<=gridN;g++){
    const y=P.t+g/gridN*ph;
    ctx.beginPath();ctx.moveTo(P.l,y);ctx.lineTo(W-P.r,y);ctx.stroke();
    ctx.fillStyle='#475569';ctx.font='10px Rubik';ctx.textAlign='right';ctx.textBaseline='middle';
    ctx.fillText((maxV*(1-g/gridN)).toFixed(1),P.l-6,y);
  }

  // ── Change-point vertical band ──
  if(d.cp){
    const cpIdx=dates.indexOf(d.cp);
    if(cpIdx>=0){
      const cx=xOf(cpIdx);
      // translucent band
      ctx.fillStyle='rgba(167,139,250,0.06)';
      ctx.fillRect(cx-12,P.t,24,ph);
      // dashed line
      ctx.save();
      ctx.setLineDash([4,4]);ctx.strokeStyle='rgba(167,139,250,0.6)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(cx,P.t);ctx.lineTo(cx,P.t+ph);ctx.stroke();
      ctx.restore();
      // diamond marker
      ctx.save();
      ctx.fillStyle='#a78bfa';
      ctx.beginPath();ctx.moveTo(cx,P.t+ph+6);ctx.lineTo(cx-5,P.t+ph+12);ctx.lineTo(cx,P.t+ph+18);ctx.lineTo(cx+5,P.t+ph+12);ctx.closePath();ctx.fill();
      ctx.fillStyle='#c4b5fd';ctx.font='bold 9px Rubik';ctx.textAlign='center';ctx.textBaseline='bottom';
      ctx.fillText('CP',cx,P.t-2);
      ctx.restore();
    }
  }

  // ── Standard line ──
  const ys=yOf(d.std);
  if(ys>P.t&&ys<P.t+ph){
    ctx.save();ctx.setLineDash([6,4]);ctx.strokeStyle='rgba(239,68,68,0.5)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(P.l,ys);ctx.lineTo(W-P.r,ys);ctx.stroke();
    ctx.fillStyle='rgba(239,68,68,0.7)';ctx.font='bold 9px Rubik';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText('תקן',P.l+4,ys-8);
    ctx.restore();
  }

  // ── 30% line ──
  const y30=yOf(d.std*0.3);
  if(y30>P.t&&y30<P.t+ph){
    ctx.save();ctx.setLineDash([3,4]);ctx.strokeStyle='rgba(245,158,11,0.35)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(P.l,y30);ctx.lineTo(W-P.r,y30);ctx.stroke();
    ctx.fillStyle='rgba(245,158,11,0.5)';ctx.font='9px Rubik';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText('30%',P.l+4,y30-7);
    ctx.restore();
  }

  // ── Area gradient ──
  const grad=ctx.createLinearGradient(0,P.t,0,P.t+ph);
  grad.addColorStop(0,'rgba(59,130,246,0.15)');grad.addColorStop(1,'rgba(59,130,246,0)');
  ctx.beginPath();ctx.moveTo(xOf(0),yOf(vals[0]));
  for(let i=1;i<n;i++){const cx=(xOf(i-1)+xOf(i))/2;ctx.quadraticCurveTo(xOf(i-1),yOf(vals[i-1]),cx,(yOf(vals[i-1])+yOf(vals[i]))/2);}
  ctx.lineTo(xOf(n-1),yOf(vals[n-1]));
  ctx.lineTo(xOf(n-1),P.t+ph);ctx.lineTo(xOf(0),P.t+ph);ctx.closePath();ctx.fillStyle=grad;ctx.fill();

  // ── Smooth line ──
  ctx.beginPath();ctx.moveTo(xOf(0),yOf(vals[0]));
  for(let i=1;i<n;i++){const cx=(xOf(i-1)+xOf(i))/2;ctx.quadraticCurveTo(xOf(i-1),yOf(vals[i-1]),cx,(yOf(vals[i-1])+yOf(vals[i]))/2);}
  ctx.lineTo(xOf(n-1),yOf(vals[n-1]));
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2.5;ctx.lineCap='round';ctx.stroke();

  // ── Points with glow ──
  for(let i=0;i<n;i++){
    const x=xOf(i),y=yOf(vals[i]);
    const det=marks[i]!=='<'&&raw[i]>0;
    // glow
    ctx.beginPath();ctx.arc(x,y,8,0,Math.PI*2);ctx.fillStyle='rgba(59,130,246,0.12)';ctx.fill();
    // dot
    ctx.beginPath();ctx.arc(x,y,3.5,0,Math.PI*2);
    if(det){ctx.fillStyle='#3b82f6';ctx.fill();ctx.strokeStyle='#1d4ed8';ctx.lineWidth=1;ctx.stroke();}
    else{ctx.fillStyle='var(--surface)';ctx.fill();ctx.strokeStyle='#3b82f6';ctx.lineWidth=1.5;ctx.stroke();}
  }

  // ── X axis dates ──
  ctx.fillStyle='#475569';ctx.font='10px Rubik';ctx.textAlign='center';ctx.textBaseline='top';
  const step=Math.max(1,Math.ceil(n/6));
  for(let i=0;i<n;i+=step) ctx.fillText(dates[i],xOf(i),P.t+ph+6);
  if((n-1)%step!==0) ctx.fillText(dates[n-1],xOf(n-1),P.t+ph+6);
}

render();
</script>
</body>
</html>
